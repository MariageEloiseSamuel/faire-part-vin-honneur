<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eloïse & Samuel – Vin d'honneur – 7 Novembre 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f5ede3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Pétales */
  .petal {
    position: fixed;
    width: 8px; height: 14px;
    background: #c8744a;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
    pointer-events: none;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0;   }
  }

  /* ── SCÈNE ── */
  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 360px;
    position: relative;
  }

  .names {
    font-family: 'Cormorant Garamond', serif;
    color: #8a4020;
    font-size: 30px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 1px;
    margin-bottom: 18px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.9s ease 0.4s, transform 0.9s ease 0.4s;
  }
  .names.visible { opacity: 1; transform: translateY(0); }

  /* ── ENVELOPPE ── */
  .envelope-wrap {
    position: relative;
    width: 360px;
    height: 260px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .env-body {
    position: absolute;
    inset: 0;
    background: #fdf6ee;
    border-radius: 4px;
    border: 1px solid #d9a88a;
  }
  .env-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, #f0d9c8 0%, transparent 45%),
      linear-gradient(225deg, #f0d9c8 0%, transparent 45%);
  }

  .env-flap-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 0;
    border-left: 180px solid transparent;
    border-right: 180px solid transparent;
    border-bottom: 130px solid #e8c9b0;
    pointer-events: none;
  }

  /* Logo sceau */
  .seal {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 88px; height: 88px;
    z-index: 10;
    transition: transform 0.3s, opacity 0.5s;
  }
  .seal img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.12));
  }
  .envelope-wrap:hover .seal { transform: translateX(-50%) scale(1.05); }
  .seal.hidden { opacity: 0; pointer-events: none; }

  /* Rabat */
  .env-flap-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 140px;
    transform-origin: top center;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.4,0,0.2,1);
    z-index: 2;
    pointer-events: none;
  }
  .env-flap-top .flap-shape {
    position: absolute; inset: 0;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    background: linear-gradient(180deg, #fdf6ee 0%, #f0dece 100%);
    border-bottom: 1px solid #d9a88a;
  }
  .env-flap-top .flap-shadow {
    position: absolute; inset: 0;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.07) 100%);
  }
  .opened .env-flap-top { transform: rotateX(-180deg); }

  /* ── FAIRE-PART ── */
  /* Positionné SOUS l'enveloppe dans le DOM pour qu'il sorte par le haut */
  .card-container {
    position: absolute;
    /* Centré sur l'enveloppe */
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    /* Aligné sur le bas de l'enveloppe */
    top: 220px; /* sera déplacé vers le haut via --offset */
    z-index: 5;
    transition: top 1.3s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.5s ease;
    opacity: 0;
  }

  .card {
    width: 100%;
    border-radius: 3px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.22);
    overflow: hidden;
    cursor: zoom-in;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card:hover {
    transform: scale(1.02);
    box-shadow: 0 18px 50px rgba(0,0,0,0.28);
  }
  .card img { width: 100%; display: block; pointer-events: none; }

  /* Quand ouvert : remonte au-dessus de l'enveloppe */
  .opened-state .card-container {
    top: -370px;
    opacity: 1;
  }

  /* hint zoom sous la carte */
  .hint-zoom {
    margin-top: 10px;
    text-align: center;
    color: #a85930;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.8s ease 1.6s;
    animation: none;
  }
  .hint-zoom.visible {
    opacity: 0.75;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.6; } 50% { opacity: 1; }
  }

  /* Hint ouvrir */
  .hint {
    text-align: center;
    margin-top: 20px;
    color: #a85930;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
    transition: opacity 0.4s;
  }
  .hint.hidden { opacity: 0 !important; pointer-events: none; animation: none; }

  .date {
    text-align: center;
    margin-top: 10px;
    color: #a85930;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 1s ease 1.2s;
  }
  .date.visible { opacity: 1; }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(20,8,2,0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.active { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .lightbox img {
    max-width: 92vw; max-height: 92vh;
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: zoomIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  @keyframes zoomIn { from { transform: scale(0.75); opacity:0; } to { transform: scale(1); opacity:1; } }
  .lightbox-close {
    position: fixed; top: 18px; right: 26px;
    color: #fdf6ee; font-size: 38px;
    cursor: pointer; opacity: 0.8;
    font-weight: 300; font-family: sans-serif;
    transition: opacity 0.2s;
    line-height: 1;
  }
  .lightbox-close:hover { opacity: 1; }
</style>
</head>

<script>
  // Pétales
  const petalsEl = document.getElementById('petals');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `left:${Math.random()*100}vw;animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*8}s;opacity:${0.3+Math.random()*0.4};transform:scale(${0.5+Math.random()}) rotate(${Math.random()*60}deg)`;
    petalsEl.appendChild(p);
  }

  let opened = false;

  function openEnvelope() {
    if (opened) return;
    opened = true;

    // Ouvre le rabat
    document.getElementById('flap').closest('.envelope-wrap')
      .querySelector('.env-flap-top') // no-op, just reference
    document.getElementById('envWrap').querySelector('.env-flap-top').style.transform = 'rotateX(-180deg)';

    // Cache le sceau
    document.getElementById('seal').classList.add('hidden');

    // Fait sortir la carte
    document.getElementById('cardContainer').parentElement.classList.add('opened-state');

    // Masque hint ouvrir
    document.getElementById('hint').classList.add('hidden');

    // Affiche les éléments
    setTimeout(() => {
      document.getElementById('names').classList.add('visible');
      document.getElementById('date').classList.add('visible');
      document.getElementById('hintZoom').classList.add('visible');
    }, 500);
  }

  function openLightbox(e) {
    if (!opened) return;
    e.stopPropagation();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
